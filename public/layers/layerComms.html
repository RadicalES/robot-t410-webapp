<div id="layerComms" class="layer">
	<form id="formComms" action="" method="post" onsubmit="return saveCommsCfg()">

		<div class="card">
			<legend>Network Interfaces</legend>

			<div id="layerComms_wired" style="margin-top: 0.5em;">
				<h3 id="net_wired_name"></h3>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<input class="w3-check small-check" type="checkbox" id="wired_dhcp" value="1" onclick="setNetState('wired',this.checked);" />
						<label>DHCP</label>
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>MAC Address:</label>
						<input class="w3-input input-short" name="wired_mac" disabled id="wired_mac" value="" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>IP Address:</label>
						<input class="w3-input input-short" id="wired_ipa" value="" />
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>Subnet Mask:</label>
						<input class="w3-input input-short" id="wired_nm" value="" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>Default Gateway:</label>
						<input class="w3-input input-short" id="wired_gw" value="" />
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>DNS Server:</label>
						<input class="w3-input input-short" id="wired_dns" value="" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>NTP Server:</label>
						<input class="w3-input input-short" id="wired_ntp" value="" />
					</div>
				</div>
			</div>

			<div id="layerComms_wireless" style="margin-top: 1.5em;">
				<h3 id="net_wireless_name"></h3>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<input class="w3-check small-check" type="checkbox" id="wireless_dhcp" value="1" onclick="setNetState('wireless',this.checked);" />
						<label>DHCP</label>
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>MAC Address:</label>
						<input class="w3-input input-short" name="wireless_mac" disabled id="wireless_mac" value="" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>IP Address:</label>
						<input class="w3-input input-short" id="wireless_ipa" value="" />
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>Subnet Mask:</label>
						<input class="w3-input input-short" id="wireless_nm" value="" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>Default Gateway:</label>
						<input class="w3-input input-short" id="wireless_gw" value="" />
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>DNS Server:</label>
						<input class="w3-input input-short" id="wireless_dns" value="" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>NTP Server:</label>
						<input class="w3-input input-short" id="wireless_ntp" value="" />
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>AP SSID:</label>
						<input class="w3-input input-short" id="wireless_ssid" value="" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>Passkey:</label>
						<input class="w3-input input-short" type="password" id="wireless_passkey" value="" />
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>AP MAC:</label>
						<input class="w3-input input-short" disabled id="wireless_ap_mac" value="" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>Signal Strength:</label>
						<input class="w3-input input-short" disabled id="wireless_ap_signal" value="" />
					</div>
				</div>
			</div>
		</div>

		<div class="card">
			<legend>Paltrack PalPi Services</legend>
			<div id="layerComms_palpi" style="margin-top: 0.5em;">
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<input class="w3-check small-check" type="checkbox" id="palpi_enabled" onclick="toggleSerialService('palpi')"/>
						<label>Enabled</label>
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>Print Mode</label>
						<input class="w3-input input-short" id="palpi_print_mode" value="Simple" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>Local Server Port</label>
						<input class="w3-input input-short" id="palpi_local_port" value="5000" />
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>POD Server URL</label>
						<input class="w3-input input-short" id="palpi_pod_server_url" value="http://palpi:8010" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>SYNC Server URL</label>
						<input class="w3-input input-short" id="palpi_sync_server_url" value="http://palpi:8089" />
					</div>
				</div>
			</div>
		</div>

		<div class="card">
			<legend>Websocket Servers</legend>
			<div id="layerComms_cardreader" style="margin-top: 0.5em;">
				<h3>Card Reader</h3>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<input class="w3-check small-check" type="checkbox" id="cardreader_enabled" onclick="toggleSerialService('cardreader')"/>
						<label>Enabled</label>
					</div>
					<div class="w3-col l6 m6 irow">
						<input class="w3-check small-check" type="checkbox" id="cardreader_foreign_connect"/>
						<label>Allow Foreign Connections</label>
					</div>
				</div>
				<div class="w3-row">
					<div class="w3-col l6 m6 irow">
						<label>Websocket Port</label>
						<input class="w3-input input-short" id="cardreader_server_port" value="8100" />
					</div>
					<div class="w3-col l6 m6 irow">
						<label>Output Format:</label>
						<input class="w3-input input-short" id="cardreader_output_format" value="[CARD]:%s" />
					</div>
				</div>
			</div>
		</div>

		<div style="display:flex; gap:0.8em; flex-wrap:wrap;">
			<button class="btn btn-danger" type="button" onclick="resetCommsCfg()">Reset Settings</button>
			<button class="btn btn-primary" type="submit">Save Settings</button>
		</div>

		<script type="text/javascript">
			const ipa = new LiveValidation( 'wired_ipa', {onlyOnSubmit: false, validMessage: 'OK' } );
			ipa.add( Validate.IPAddress );
			ipa.add( Validate.Presence );

			const sn = new LiveValidation( 'wired_nm', {onlyOnSubmit: false, validMessage: 'OK' } );
			sn.add( Validate.IPAddress );
			sn.add( Validate.Presence );

			const gw = new LiveValidation( 'wired_gw', {onlyOnSubmit: false, validMessage: 'OK' } );
			gw.add( Validate.IPAddress );
			gw.add( Validate.Presence );

			const ntp = new LiveValidation( 'wired_ntp', {onlyOnSubmit: false, validMessage: 'OK' } );
			ntp.add( Validate.IPAddress );
			ntp.add( Validate.Presence );

			const dns = new LiveValidation( 'wired_dns', {onlyOnSubmit: false, validMessage: 'OK' } );
			ntp.add( Validate.IPAddress );
			ntp.add( Validate.Presence );
		</script>
	</form>
</div>
