<div id="layerHome" class="layer">
	<div class="w3-card" style="padding: 1em; margin-bottom: 2em;">
	<legend>Device Information</legend>
	<div class="w3-row irow">
		<label class="i-label">Model:</label> <input class="roTextBox" id="model" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">Serial Number:</label> <input class="roTextBox" id="serialno" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">Manufacturing Date:</label> <input class="roTextBox"  id="mandate" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">Revision:</label> <input class="roTextBox" id="hwrev" value="" readonly="readonly"  />
	</div>
	<div class="w3-row irow">
		<label class="i-label">Firmware Version:</label> <input class="roTextBox" id="firmware" value="" readonly="readonly"  />
	</div>
	<div class="w3-row irow">
		<label class="i-label">MAC Address:</label> <input class="roTextBox" id="macaddress" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">Kernel Verion:</label> <input class="roTextBox" id="kernel" value="" readonly="readonly"  />
	</div>
	<div class="w3-row irow">
		<label class="i-label">Wlan Ports:</label> <input class="roTextBox" id="wlanports" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">Ethernet Ports:</label> <input class="roTextBox" id="etherports" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">RS232 Serial Ports:</label> <input class="roTextBox" id="serial232ports" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">RS485 Serial Ports:</label> <input class="roTextBox" id="serial485ports" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">USB Host Ports:</label> <input class="roTextBox" id="usbhostports" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">USB Slave Ports:</label> <input class="roTextBox" id="usbslaveports" value="" readonly="readonly" />
	</div>
	<div class="w3-row irow">
		<label class="i-label">Up Time:</label> <input class="roTextBox" id="uptime" value="" readonly="readonly" />
	</div>
	</div>
</div>
